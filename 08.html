<!DOCTYPE html>
<html>
<head>
    <title>Ordem Decrescente</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            padding: 20px; 
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
            color: white;
            text-align: center;
        }
        .container { 
            background: rgba(255,255,255,0.15); 
            padding: 40px; 
            border-radius: 25px; 
            max-width: 600px;
            margin: 50px auto;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .input-group {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0;
        }
        input { 
            padding: 12px; 
            font-size: 18px; 
            border: none; 
            border-radius: 10px; 
            width: 120px;
            margin: 0 10px;
            text-align: center;
        }
        button { 
            background: linear-gradient(45deg, #ff6b6b, #ee5a52); 
            color: white; 
            border: none; 
            padding: 18px 40px; 
            border-radius: 30px; 
            font-size: 20px; 
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
        }
        button:hover { transform: scale(1.05); }
        .resultado { 
            background: rgba(255,255,255,0.25); 
            padding: 30px; 
            border-radius: 20px; 
            margin-top: 30px;
            font-size: 24px;
        }
        .ordem1 { color: #ffd700; font-size: 28px; }
        .ordem2 { color: #c0c0c0; font-size: 24px; }
        .ordem3 { color: #cd7f32; font-size: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏆 Ordenação Decrescente</h1>
        <p>Digite 3 números <strong>INTEIROS DIFERENTES</strong></p>
        
        <div class="input-group">
            <input type="number" id="num1" placeholder="A">
            <input type="number" id="num2" placeholder="B">
            <input type="number" id="num3" placeholder="C">
        </div>
        
        <button onclick="ordenar()">ORDENAR 📊</button>
        
        <div id="resultado" class="resultado" style="display:none;"></div>
    </div>

    <script>
        function ordenar() {
            // 1. Ler os 3 valores
            let A = parseInt(document.getElementById('num1').value);
            let B = parseInt(document.getElementById('num2').value);
            let C = parseInt(document.getElementById('num3').value);

            // 2. Validar entrada
            if (isNaN(A) || isNaN(B) || isNaN(C)) {
                alert("❌ Digite 3 números inteiros!");
                return;
            }

            // 3. Verificar se são diferentes
            if (A === B || A === C || B === C) {
                alert("❌ Os números devem ser DIFERENTES!");
                return;
            }

            // 4. Ordenar em ordem decrescente (maior → menor)
            let numeros = [A, B, C];
            numeros.sort(function(a, b) { return b - a; }); // Decrescente

            // 5. Mostrar resultado
            let resultado = document.getElementById('resultado');
            resultado.innerHTML = `
                <h2>📉 ORDEM DECRESCENTE:</h2>
                <div class="ordem1">🥇 ${numeros[0]}</div>
                <div class="ordem2">🥈 ${numeros[1]}</div>
                <div class="ordem3">🥉 ${numeros[2]}</div>
                <hr>
                <p><small>Números originais: ${A}, ${B}, ${C}</small></p>
            `;
            resultado.style.display = 'block';

            // 6. Console técnico
            console.log(`Original: [${A}, ${B}, ${C}] → Decrescente: [${numeros[0]}, ${numeros[1]}, ${numeros[2]}]`);
        }
    </script>
</body>
</html>
